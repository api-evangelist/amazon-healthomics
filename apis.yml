aid: amazon-healthomics
name: Amazon HealthOmics
description: >-
  AWS HealthOmics is a purpose-built service for healthcare and life sciences
  organizations that helps store, query, and analyze genomic, transcriptomic,
  and other omics data to generate insights and accelerate scientific
  discoveries and improve healthcare.
